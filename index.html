<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생팸 Clean Air</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#7ecbff,#d7f7d2);
  text-align:center;
  overflow-x:hidden;
}

.bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background:
    radial-gradient(circle at 20% 10%,rgba(255,255,255,.7),transparent 20%),
    linear-gradient(to bottom,#77cfff,#e6f8ff 45%,#9bd36f);
}

.clean{
  position:fixed;
  bottom:25px;
  left:22px;
  font-size:60px;
  z-index:-1;
}

.plant{
  position:fixed;
  bottom:25px;
  right:22px;
  font-size:68px;
  z-index:-1;
  animation:sway 2s infinite alternate;
}

@keyframes sway{
  to{transform:rotate(5deg)}
}

.app{
  width:92%;
  max-width:620px;
  margin:28px auto;
  padding:24px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(12px);
  border-radius:28px;
  box-shadow:0 12px 35px rgba(0,0,0,.24);
}

h1{
  margin:8px 0;
  color:#1b5e20;
  font-size:31px;
}

.subtitle{
  color:#33691e;
  font-weight:bold;
}

select,button{
  width:90%;
  padding:14px;
  margin:10px;
  font-size:16px;
  border-radius:15px;
  border:1px solid #cfd8dc;
}

button{
  background:#43a047;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#2e7d32;
}

.scene{
  position:relative;
  height:270px;
  margin-top:18px;
  border-radius:24px;
  overflow:hidden;
  display:none;
  background-size:cover;
  background-position:center;
  box-shadow:0 8px 24px rgba(0,0,0,.28);
}

.scene::after{
  content:var(--cityname);
  position:absolute;
  left:20px;
  bottom:18px;
  color:white;
  font-size:32px;
  font-weight:bold;
  text-shadow:0 3px 10px black;
  z-index:8;
}

.sun{
  position:absolute;
  top:18px;
  right:22px;
  font-size:60px;
  display:none;
  z-index:8;
  animation:spin 5s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.weather-emoji{
  position:absolute;
  right:20px;
  bottom:20px;
  font-size:66px;
  display:none;
  z-index:9;
  animation:bounce 1s infinite alternate;
}

@keyframes bounce{
  to{transform:translateY(-10px)}
}

.rain,.wind,.dust{
  position:absolute;
  inset:0;
  display:none;
  z-index:6;
}

.drop{
  position:absolute;
  width:2px;
  height:26px;
  background:rgba(255,255,255,.9);
  animation:rainFall .75s linear infinite;
}

@keyframes rainFall{
  from{transform:translateY(-40px)}
  to{transform:translateY(310px)}
}

.wind-line{
  position:absolute;
  width:135px;
  height:3px;
  background:rgba(255,255,255,.9);
  border-radius:30px;
  animation:windMove 1.2s linear infinite;
}

@keyframes windMove{
  from{transform:translateX(-160px)}
  to{transform:translateX(760px)}
}

.dust{
  background:rgba(88,75,60,.34);
  backdrop-filter:blur(2px);
}

.dust-particle{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  background:rgba(70,60,50,.48);
  animation:dustMove 3s infinite alternate;
}

@keyframes dustMove{
  to{transform:translate(25px,-20px)}
}

.dark{
  filter:brightness(.65);
}

.card{
  margin-top:17px;
  padding:15px;
  border-radius:18px;
  background:rgba(255,255,255,.8);
  line-height:1.7;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  opacity:0;
}

.message{
  font-size:21px;
  font-weight:bold;
  color:#1b5e20;
}

.score{
  font-weight:bold;
  color:#2e7d32;
  font-size:19px;
}

.action{
  background:#eefaf0;
  border-left:7px solid #43a047;
  text-align:left;
}

.source,.update{
  font-size:13px;
  color:#555;
}

.show{
  animation:fadeIn .8s forwards;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

@media(max-width:600px){
  h1{font-size:27px}
  .scene{height:225px}
  .clean,.plant{font-size:48px}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="clean">🧹✨</div>
<div class="plant">🪴</div>

<div class="app">
  <h1>🌿 생팸 Clean Air</h1>
  <p id="date" class="subtitle"></p>
  <p>베트남 교실 청결과 건강한 환기를 위한 날씨 추천 앱</p>

  <select id="city">
    <option value="21.0285,105.8542,하노이,hanoi">🇻🇳 하노이</option>
    <option value="10.8231,106.6297,호치민,hochiminh">🇻🇳 호치민</option>
    <option value="16.0544,108.2022,다낭,danang">🇻🇳 다낭</option>
  </select>

  <button onclick="checkAir()">환기 추천 확인하기</button>

  <div class="scene" id="scene">
    <div class="sun" id="sun">☀️</div>
    <div class="rain" id="rain"></div>
    <div class="wind" id="wind"></div>
    <div class="dust" id="dust"></div>
    <div class="weather-emoji" id="emoji"></div>
  </div>

  <div class="card" id="result"></div>
  <div class="card score" id="score"></div>
  <div class="card message" id="message"></div>
  <div class="card action" id="action"></div>
  <div class="card update" id="update"></div>
</div>

<script>
const cityStyles = {
  hanoi:{
    name:"하노이",
    image:"hanoi.jpg",
    fallback:"linear-gradient(135deg,#a5d6a7,#2e7d32)"
  },
  hochiminh:{
    name:"호치민",
    image:"hcm.jpg",
    fallback:"linear-gradient(135deg,#ffcc80,#ef6c00)"
  },
  danang:{
    name:"다낭",
    image:"danang.jpg",
    fallback:"linear-gradient(135deg,#80deea,#00838f)"
  }
};

document.getElementById("date").innerText =
  new Date().toLocaleDateString("ko-KR",{
    year:"numeric",
    month:"long",
    day:"numeric",
    weekday:"long"
  });

function makeRain(){
  const rain=document.getElementById("rain");
  rain.innerHTML="";
  for(let i=0;i<60;i++){
    const d=document.createElement("div");
    d.className="drop";
    d.style.left=Math.random()*100+"%";
    d.style.animationDelay=Math.random()+"s";
    rain.appendChild(d);
  }
}

function makeWind(){
  const wind=document.getElementById("wind");
  wind.innerHTML="";
  for(let i=0;i<10;i++){
    const w=document.createElement("div");
    w.className="wind-line";
    w.style.top=(35+i*22)+"px";
    w.style.animationDelay=Math.random()+"s";
    wind.appendChild(w);
  }
}

function makeDust(){
  const dust=document.getElementById("dust");
  dust.innerHTML="";
  for(let i=0;i<40;i++){
    const p=document.createElement("div");
    p.className="dust-particle";
    p.style.left=Math.random()*100+"%";
    p.style.top=Math.random()*100+"%";
    p.style.animationDelay=Math.random()*2+"s";
    dust.appendChild(p);
  }
}

makeRain();
makeWind();
makeDust();

document.getElementById("city").addEventListener("change",checkAir);

function clearScreen(){
  ["result","score","message","action","update"].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove("show");
    el.innerHTML="";
  });

  ["sun","rain","wind","dust","emoji"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });

  const scene=document.getElementById("scene");
  scene.style.display="none";
  scene.className="scene";
}

function scoreCalc(pm25,aqi,rain,wind,humidity){
  let score=100;

  if(pm25>15)score-=15;
  if(pm25>35)score-=25;
  if(aqi>50)score-=15;
  if(aqi>100)score-=25;
  if(rain>0)score-=25;
  if(wind>25)score-=15;
  if(humidity>80)score-=10;
  if(humidity<30)score-=8;

  return Math.max(0,score);
}

async function checkAir(){
  clearScreen();

  const [lat,lon,cityName,cityKey]=document.getElementById("city").value.split(",");

  const weatherUrl =
  `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation&timezone=auto&forecast_days=1`;

  const airUrl =
  `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm2_5,pm10,us_aqi&timezone=auto&forecast_days=1`;

  try{
    const [weatherResponse,airResponse]=await Promise.all([
      fetch(weatherUrl),
      fetch(airUrl)
    ]);

    if(!weatherResponse.ok || !airResponse.ok){
      throw new Error("API error");
    }

    const weatherData=await weatherResponse.json();
    const airData=await airResponse.json();

    const temp=weatherData.current.temperature_2m;
    const humidity=weatherData.current.relative_humidity_2m;
    const wind=weatherData.current.wind_speed_10m;
    const rain=weatherData.current.precipitation;

    const pm25=airData.current.pm2_5;
    const pm10=airData.current.pm10;
    const aqi=airData.current.us_aqi;

    const score=scoreCalc(pm25,aqi,rain,wind,humidity);

    const scene=document.getElementById("scene");
    const city=cityStyles[cityKey];

    scene.style.display="block";
    scene.style.backgroundImage =
      `linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,.08)), url('${city.image}'), ${city.fallback}`;
    scene.style.setProperty("--cityname",`"${city.name}"`);

    let emoji="";
    let message="";
    let action="";

    if(pm25>35 || aqi>100){
      document.getElementById("dust").style.display="block";
      emoji="😷";
      message="초미세먼지나 공기질이 좋지 않아요.";
      action=`
        <strong>오늘 추천 행동</strong><br>
        ❌ 긴 시간 환기 금지<br>
        ✅ 마스크 착용 권장<br>
        ✅ 교실 바닥 먼지 정리하기<br>
        ✅ 싱고니움 상태 확인하기<br>
        ✅ 쓰레기 줍고 교실 청결 유지하기
      `;
      scene.classList.add("dark");
    }
    else if(rain>0){
      document.getElementById("rain").style.display="block";
      emoji="☔";
      message="비가 오고 있어요. 환기는 짧게 하는 게 좋아요.";
      action=`
        <strong>오늘 추천 행동</strong><br>
        ✅ 창문 5~10분만 짧게 열기<br>
        ✅ 젖은 우산 정리하기<br>
        ✅ 바닥 미끄럼 주의하기<br>
        ✅ 교실 습도 확인하기<br>
        ✅ 쓰레기통 주변 정리하기
      `;
      scene.classList.add("dark");
    }
    else if(wind>=25){
      document.getElementById("wind").style.display="block";
      emoji="🌬️";
      message="바람이 강해요. 창문을 조심해서 열어야 해요.";
      action=`
        <strong>오늘 추천 행동</strong><br>
        ✅ 창문 조금만 열기<br>
        ✅ 문 세게 닫힘 주의하기<br>
        ✅ 책상 위 종이 정리하기<br>
        ✅ 쓰레기 줍기<br>
        ✅ 식물이 넘어지지 않게 확인하기
      `;
    }
    else if(score>=80){
      document.getElementById("sun").style.display="block";
      emoji="🌞";
      message="오늘은 환기하기 좋은 날씨네요!";
      action=`
        <strong>오늘 추천 행동</strong><br>
        ✅ 창문 15~20분 열기<br>
        ✅ 교실 쓰레기 줍기<br>
        ✅ 싱고니움 햇빛 확인하기<br>
        ✅ 깨끗한 공기 유지하기<br>
        ✅ 친구들에게 환기 시간 알려주기
      `;
    }
    else{
      emoji="🙂";
      message="짧게 환기하기에는 괜찮은 날이에요.";
      action=`
        <strong>오늘 추천 행동</strong><br>
        ✅ 창문 10분 정도 열기<br>
        ✅ 교실 바닥 확인하기<br>
        ✅ 식물 상태 확인하기<br>
        ✅ 쓰레기 줍기
      `;
    }

    document.getElementById("emoji").innerText=emoji;
    document.getElementById("emoji").style.display="block";

    const now=new Date();

    document.getElementById("result").innerHTML=`
      <strong>${cityName} 현재 상태</strong><br>
      기준 시간: ${weatherData.current.time}<br>
      온도: ${temp}℃<br>
      습도: ${humidity}%<br>
      바람 세기: ${wind} km/h<br>
      강수량: ${rain} mm<br>
      초미세먼지(PM2.5): ${pm25}㎍/㎥<br>
      미세먼지(PM10): ${pm10}㎍/㎥<br>
      공기질 지수(AQI): ${aqi}<br>
      <div class="source">자료 출처: Open-Meteo Weather & Air Quality API</div>
    `;

    document.getElementById("score").innerText=`환기 점수: ${score}점 / 100점`;
    document.getElementById("message").innerText=message;
    document.getElementById("action").innerHTML=action;
    document.getElementById("update").innerText=
      `마지막 확인: ${now.toLocaleTimeString("ko-KR")} / 5분마다 자동 재측정`;

    setTimeout(()=>{
      ["result","score","message","action","update"].forEach(id=>{
        document.getElementById(id).classList.add("show");
      });
    },100);

  }catch(error){
    document.getElementById("message").innerText =
      "날씨 정보를 불러오지 못했습니다. 인터넷 연결 또는 API 상태를 확인해주세요.";
    document.getElementById("message").classList.add("show");
  }
}

checkAir();
setInterval(checkAir,5*60*1000);
</script>

</body>
</html>
