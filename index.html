<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>생팸 Clean Air</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  text-align:center;
  background:linear-gradient(#8fd3ff,#d8f7d2);
  overflow-x:hidden;
}

.city-bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background:linear-gradient(to bottom,#7ecbff 0%,#e3f7ff 50%,#8bc34a 100%);
}

.clean{
  position:fixed;
  bottom:25px;
  left:25px;
  font-size:65px;
  z-index:-2;
}

.plant{
  position:fixed;
  bottom:28px;
  right:25px;
  font-size:70px;
  z-index:-2;
  animation:sway 2s infinite alternate;
}

@keyframes sway{
  to{transform:rotate(5deg)}
}

.app{
  max-width:600px;
  width:92%;
  margin:35px auto;
  padding:25px;
  background:rgba(255,255,255,.94);
  border-radius:28px;
  box-shadow:0 10px 30px rgba(0,0,0,.22);
}

h1{
  color:#1b5e20;
  margin-bottom:5px;
}

select,button{
  width:90%;
  padding:13px;
  margin:10px;
  font-size:16px;
  border-radius:13px;
  border:1px solid #bbb;
}

button{
  background:#43a047;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#2e7d32;
}

.scene{
  position:relative;
  height:260px;
  margin-top:20px;
  border-radius:22px;
  overflow:hidden;
  display:none;
  background-size:cover;
  background-position:center;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.scene::after{
  content:var(--cityname);
  position:absolute;
  left:18px;
  bottom:16px;
  color:white;
  font-size:25px;
  font-weight:bold;
  text-shadow:0 3px 8px black;
  z-index:6;
}

.sun{
  position:absolute;
  top:20px;
  right:25px;
  font-size:60px;
  display:none;
  animation:spin 5s linear infinite;
  z-index:6;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.weather-emoji{
  position:absolute;
  right:22px;
  bottom:20px;
  font-size:65px;
  display:none;
  z-index:7;
  animation:bounce 1s infinite alternate;
}

@keyframes bounce{
  to{transform:translateY(-10px)}
}

.rain,.wind,.dust{
  position:absolute;
  inset:0;
  display:none;
  z-index:5;
}

.drop{
  position:absolute;
  width:2px;
  height:25px;
  background:rgba(255,255,255,.9);
  animation:rainFall .75s linear infinite;
}

@keyframes rainFall{
  from{transform:translateY(-40px)}
  to{transform:translateY(300px)}
}

.wind-line{
  position:absolute;
  width:130px;
  height:3px;
  background:rgba(255,255,255,.9);
  border-radius:30px;
  animation:windMove 1.2s linear infinite;
}

@keyframes windMove{
  from{transform:translateX(-160px)}
  to{transform:translateX(750px)}
}

.dust{
  background:rgba(90,80,70,.32);
  backdrop-filter:blur(2px);
}

.dust-particle{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  background:rgba(80,70,60,.45);
  animation:dustMove 3s infinite alternate;
}

@keyframes dustMove{
  to{transform:translate(25px,-20px)}
}

.dark{
  filter:brightness(.65);
}

.result,.message,.tip,.score{
  margin-top:18px;
  line-height:1.7;
  opacity:0;
}

.show{
  animation:fadeIn .8s forwards;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.message{
  font-size:21px;
  font-weight:bold;
  color:#1b5e20;
}

.tip{
  background:#eefaf0;
  padding:13px;
  border-radius:16px;
  border-left:6px solid #43a047;
}

.score{
  font-weight:bold;
  color:#2e7d32;
}

.source{
  font-size:13px;
  color:#555;
  margin-top:10px;
}

@media(max-width:600px){
  .scene{
    height:220px;
  }
}
</style>
</head>

<body>

<div class="city-bg"></div>
<div class="clean">🧹✨</div>
<div class="plant">🪴</div>

<div class="app">
  <h1>🌿 생팸 Clean Air</h1>
  <p id="date"></p>
  <p>교실 청결과 건강한 환기를 위한 날씨 추천 앱</p>

  <select id="city">
    <option value="37.5665,126.9780,서울,seoul">🇰🇷 대한민국 서울</option>
    <option value="35.1796,129.0756,부산,busan">🇰🇷 대한민국 부산</option>
    <option value="21.0285,105.8542,하노이,hanoi">🇻🇳 베트남 하노이</option>
    <option value="10.8231,106.6297,호치민,hochiminh">🇻🇳 베트남 호치민</option>
    <option value="16.0544,108.2022,다낭,danang">🇻🇳 베트남 다낭</option>
  </select>

  <button onclick="checkAir()">환기 추천 확인하기</button>

  <div class="scene" id="scene">
    <div class="sun" id="sun">☀️</div>
    <div class="rain" id="rain"></div>
    <div class="wind" id="wind"></div>
    <div class="dust" id="dust"></div>
    <div class="weather-emoji" id="emoji"></div>
  </div>

  <div class="result" id="result"></div>
  <div class="score" id="score"></div>
  <div class="message" id="message"></div>
  <div class="tip" id="tip"></div>
</div>

<script>
const cityStyles = {
  seoul:{
    name:"서울 도시 전경",
    image:"https://images.unsplash.com/photo-1538485399081-7c8ed4c7339e?auto=format&fit=crop&w=1200&q=80",
    fallback:"linear-gradient(135deg,#90caf9,#283593)"
  },
  busan:{
    name:"부산 도시 전경",
    image:"https://images.unsplash.com/photo-1540998145333-e2eef1a98277?auto=format&fit=crop&w=1200&q=80",
    fallback:"linear-gradient(135deg,#81d4fa,#006064)"
  },
  hanoi:{
    name:"하노이 도시 전경",
    image:"https://images.unsplash.com/photo-1583417319070-4a69db38a482?auto=format&fit=crop&w=1200&q=80",
    fallback:"linear-gradient(135deg,#a5d6a7,#2e7d32)"
  },
  hochiminh:{
    name:"호치민 도시 전경",
    image:"https://images.unsplash.com/photo-1583417319070-4a69db38a482?auto=format&fit=crop&w=1200&q=80",
    fallback:"linear-gradient(135deg,#ffcc80,#ef6c00)"
  },
  danang:{
    name:"다낭 도시 전경",
    image:"https://images.unsplash.com/photo-1559592413-7cec4d0cae2b?auto=format&fit=crop&w=1200&q=80",
    fallback:"linear-gradient(135deg,#80deea,#00838f)"
  }
};

document.getElementById("date").innerText =
  new Date().toLocaleDateString("ko-KR",{
    year:"numeric",
    month:"long",
    day:"numeric",
    weekday:"long"
  });

function makeRain(){
  const rain=document.getElementById("rain");
  rain.innerHTML="";
  for(let i=0;i<55;i++){
    const d=document.createElement("div");
    d.className="drop";
    d.style.left=Math.random()*100+"%";
    d.style.animationDelay=Math.random()+"s";
    rain.appendChild(d);
  }
}

function makeWind(){
  const wind=document.getElementById("wind");
  wind.innerHTML="";
  for(let i=0;i<10;i++){
    const w=document.createElement("div");
    w.className="wind-line";
    w.style.top=(35+i*22)+"px";
    w.style.animationDelay=Math.random()+"s";
    wind.appendChild(w);
  }
}

function makeDust(){
  const dust=document.getElementById("dust");
  dust.innerHTML="";
  for(let i=0;i<35;i++){
    const p=document.createElement("div");
    p.className="dust-particle";
    p.style.left=Math.random()*100+"%";
    p.style.top=Math.random()*100+"%";
    p.style.animationDelay=Math.random()*2+"s";
    dust.appendChild(p);
  }
}

makeRain();
makeWind();
makeDust();

document.getElementById("city").addEventListener("change",checkAir);

function clearScreen(){
  ["result","message","tip","score"].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove("show");
    el.innerHTML="";
  });

  ["sun","rain","wind","dust","emoji"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });

  const scene=document.getElementById("scene");
  scene.style.display="none";
  scene.className="scene";
}

function scoreCalc(pm25,aqi,rain,wind,humidity){
  let score=100;

  if(pm25>15)score-=15;
  if(pm25>35)score-=25;
  if(aqi>50)score-=15;
  if(aqi>100)score-=25;
  if(rain>0)score-=25;
  if(wind>25)score-=15;
  if(humidity>80)score-=10;
  if(humidity<30)score-=8;

  return Math.max(0,score);
}

async function checkAir(){
  clearScreen();

  const [lat,lon,cityName,cityKey]=document.getElementById("city").value.split(",");

  const weatherUrl =
  `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation&timezone=auto&forecast_days=1`;

  const airUrl =
  `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm2_5,pm10,us_aqi&timezone=auto&forecast_days=1`;

  try{
    const [weatherResponse,airResponse]=await Promise.all([
      fetch(weatherUrl),
      fetch(airUrl)
    ]);

    if(!weatherResponse.ok || !airResponse.ok){
      throw new Error("API error");
    }

    const weatherData=await weatherResponse.json();
    const airData=await airResponse.json();

    const temp=weatherData.current.temperature_2m;
    const humidity=weatherData.current.relative_humidity_2m;
    const wind=weatherData.current.wind_speed_10m;
    const rain=weatherData.current.precipitation;

    const pm25=airData.current.pm2_5;
    const pm10=airData.current.pm10;
    const aqi=airData.current.us_aqi;

    const score=scoreCalc(pm25,aqi,rain,wind,humidity);

    const scene=document.getElementById("scene");
    const city=cityStyles[cityKey];

    scene.style.display="block";
    scene.style.backgroundImage =
      `linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,.08)), url('${city.image}'), ${city.fallback}`;
    scene.style.backgroundSize="cover";
    scene.style.backgroundPosition="center";
    scene.style.setProperty("--cityname",`"${city.name}"`);

    let emoji="";
    let message="";
    let tip="";

    if(pm25>35 || aqi>100){
      document.getElementById("dust").style.display="block";
      emoji="😷";
      message="초미세먼지나 공기질이 좋지 않아요.";
      tip="오늘은 창문을 오래 열지 않는 것이 좋습니다. 마스크 착용을 권장하고, 교실 청소와 식물 관리에 집중하세요.";
      scene.classList.add("dark");
    }
    else if(rain>0){
      document.getElementById("rain").style.display="block";
      emoji="☔";
      message="비가 오고 있어요. 환기는 짧게 하는 게 좋아요.";
      tip="습도가 높아질 수 있으니 창문을 오래 열기보다는 5~10분 정도만 짧게 환기하세요.";
      scene.classList.add("dark");
    }
    else if(wind>=25){
      document.getElementById("wind").style.display="block";
      emoji="🌬️";
      message="바람이 강해요. 창문을 조심해서 열어야 해요.";
      tip="문이 세게 닫힐 수 있으니 창문을 조금만 열고, 주변 물건을 먼저 정리하세요.";
    }
    else{
      document.getElementById("sun").style.display="block";
      emoji="🌞";
      message="오늘은 환기하기 좋은 날씨네요!";
      tip="창문을 15~20분 정도 열어 교실 공기를 바꿔보세요. 싱고니움에게도 좋은 날이에요.";
    }

    document.getElementById("emoji").innerText=emoji;
    document.getElementById("emoji").style.display="block";

    document.getElementById("result").innerHTML=`
      <strong>${cityName} 현재 상태</strong><br>
      기준 시간: ${weatherData.current.time}<br>
      온도: ${temp}℃<br>
      습도: ${humidity}%<br>
      바람 세기: ${wind} km/h<br>
      강수량: ${rain} mm<br>
      초미세먼지(PM2.5): ${pm25}㎍/㎥<br>
      미세먼지(PM10): ${pm10}㎍/㎥<br>
      공기질 지수(AQI): ${aqi}<br>
      <div class="source">자료 출처: Open-Meteo Weather & Air Quality API / 도시 사진: Unsplash</div>
    `;

    document.getElementById("score").innerText=`환기 점수: ${score}점 / 100점`;
    document.getElementById("message").innerText=message;
    document.getElementById("tip").innerText=tip;

    setTimeout(()=>{
      ["result","score","message","tip"].forEach(id=>{
        document.getElementById(id).classList.add("show");
      });
    },100);

  }catch(error){
    document.getElementById("message").innerText =
      "날씨 정보를 불러오지 못했습니다. 인터넷 연결 또는 API 상태를 확인해주세요.";
    document.getElementById("message").classList.add("show");
  }
}
</script>

</body>
</html>
