<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Clean Class Air</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  text-align:center;
  overflow-x:hidden;
  background:linear-gradient(#9bdcff,#d8f7d2);
}

/* 전체 배경 */
.bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background:
    linear-gradient(to bottom,#8fd3ff 0%,#dff7ff 42%,#b8e986 70%,#7acb65 100%);
}

/* 교실 느낌 바닥 */
.classroom-floor{
  position:fixed;
  bottom:0;
  width:100%;
  height:120px;
  background:linear-gradient(45deg,#d9b382,#f3d7a4);
  z-index:-4;
}

/* 식물 */
.plant{
  position:fixed;
  bottom:75px;
  left:25px;
  font-size:70px;
  animation:plantMove 2.5s infinite alternate ease-in-out;
  z-index:-2;
}
@keyframes plantMove{
  to{transform:rotate(4deg)}
}

/* 청결 아이콘 */
.clean-icons{
  position:fixed;
  bottom:90px;
  right:25px;
  font-size:55px;
  z-index:-2;
}

/* 구름 */
.cloud{
  position:fixed;
  width:130px;
  height:45px;
  background:white;
  border-radius:40px;
  opacity:.75;
  animation:cloudMove 18s linear infinite;
  z-index:-3;
}
.cloud:before,.cloud:after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}
.cloud:before{width:60px;height:60px;top:-25px;left:20px}
.cloud:after{width:75px;height:75px;top:-35px;right:15px}
.c1{top:80px;left:-160px}
.c2{top:170px;left:-260px;animation-delay:6s}
@keyframes cloudMove{
  to{transform:translateX(130vw)}
}

/* 앱 카드 */
.app{
  max-width:590px;
  margin:35px auto;
  padding:25px;
  background:rgba(255,255,255,.93);
  border-radius:28px;
  box-shadow:0 10px 30px rgba(0,0,0,.22);
  backdrop-filter:blur(6px);
}

h1{
  color:#1b5e20;
  margin-bottom:5px;
}

.date{
  color:#33691e;
  font-weight:bold;
}

select,button{
  width:90%;
  padding:13px;
  margin:10px;
  font-size:16px;
  border-radius:13px;
  border:1px solid #bbb;
}

button{
  background:#43a047;
  color:white;
  border:none;
  cursor:pointer;
  transition:.2s;
}
button:hover{
  background:#2e7d32;
  transform:scale(1.03);
}

/* 랜드마크 */
.landmark{
  position:relative;
  height:250px;
  margin-top:20px;
  border-radius:22px;
  overflow:hidden;
  display:none;
  background-size:cover;
  background-position:center;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.landmark::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.35),transparent);
  pointer-events:none;
}

.landmark.sunny{
  filter:brightness(1.15) saturate(1.15);
}

.landmark.rainy{
  filter:brightness(.55) saturate(.8);
}

.landmark.dusty{
  filter:brightness(.65) blur(1.3px) grayscale(.25);
}

.landmark.windy{
  filter:brightness(1.05) saturate(1.1);
}

/* 날씨 이모지 */
.weather-emoji{
  position:absolute;
  bottom:18px;
  right:20px;
  font-size:62px;
  z-index:5;
  display:none;
  animation:bounce 1s infinite alternate;
}
@keyframes bounce{
  to{transform:translateY(-10px)}
}

/* 햇빛 */
.sun{
  position:absolute;
  top:18px;
  right:22px;
  font-size:60px;
  display:none;
  z-index:5;
  animation:spin 5s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg)}
}

/* 비 */
.rain{
  position:absolute;
  inset:0;
  display:none;
  z-index:4;
}
.drop{
  position:absolute;
  width:2px;
  height:24px;
  background:rgba(255,255,255,.85);
  animation:rainFall .75s linear infinite;
}
@keyframes rainFall{
  from{transform:translateY(-40px)}
  to{transform:translateY(290px)}
}

/* 바람 */
.wind{
  position:absolute;
  inset:0;
  display:none;
  z-index:4;
}
.wind-line{
  position:absolute;
  height:3px;
  width:110px;
  background:rgba(255,255,255,.85);
  border-radius:30px;
  animation:windMove 1.3s linear infinite;
}
@keyframes windMove{
  from{transform:translateX(-160px)}
  to{transform:translateX(700px)}
}

/* 미세먼지 */
.dust{
  position:absolute;
  inset:0;
  display:none;
  z-index:4;
  background:rgba(90,80,70,.25);
}
.dust-particle{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  background:rgba(80,70,60,.45);
  animation:dustMove 3s infinite alternate;
}
@keyframes dustMove{
  to{transform:translate(25px,-20px)}
}

/* 결과 */
.result,.message,.tip{
  margin-top:18px;
  line-height:1.7;
  opacity:0;
}

.show{
  animation:fadeIn .8s forwards;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.message{
  font-size:21px;
  font-weight:bold;
  color:#1b5e20;
}

.tip{
  background:#eefaf0;
  padding:13px;
  border-radius:16px;
  border-left:6px solid #43a047;
}

.score{
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
  color:#2e7d32;
}

@media(max-width:600px){
  .app{
    width:92%;
    margin:25px auto;
  }
  .landmark{
    height:220px;
  }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="classroom-floor"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="plant">🪴</div>
<div class="clean-icons">🧹✨</div>

<div class="app">
  <h1>🌿 Clean Class Air</h1>
  <p class="date" id="date"></p>
  <p>교실 청결과 건강한 환기를 위한 날씨 추천 앱</p>

  <select id="city">
    <option value="37.5665,126.9780,서울,seoul">🇰🇷 대한민국 서울</option>
    <option value="35.1796,129.0756,부산,busan">🇰🇷 대한민국 부산</option>
    <option value="21.0285,105.8542,하노이,hanoi">🇻🇳 베트남 하노이</option>
    <option value="10.8231,106.6297,호치민,hochiminh">🇻🇳 베트남 호치민</option>
    <option value="16.0544,108.2022,다낭,danang">🇻🇳 베트남 다낭</option>
  </select>

  <button onclick="checkAir()">환기 추천 확인하기</button>

  <div class="landmark" id="landmark">
    <div class="sun" id="sun">☀️</div>
    <div class="rain" id="rain"></div>
    <div class="wind" id="wind"></div>
    <div class="dust" id="dust"></div>
    <div class="weather-emoji" id="emoji"></div>
  </div>

  <div class="result" id="result"></div>
  <div class="score" id="score"></div>
  <div class="message" id="message"></div>
  <div class="tip" id="tip"></div>
</div>

<script>
const landmarkImages = {
  seoul: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/N_Seoul_Tower_viewed_from_the_National_Museum_of_Korea.jpg/1280px-N_Seoul_Tower_viewed_from_the_National_Museum_of_Korea.jpg",
  busan: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Gwangan_Bridge_Busan_Korea.jpg/1280px-Gwangan_Bridge_Busan_Korea.jpg",
  hanoi: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Hoan_Kiem_Lake_Hanoi.jpg/1280px-Hoan_Kiem_Lake_Hanoi.jpg",
  hochiminh: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Ben_Thanh_market_2.jpg/1280px-Ben_Thanh_market_2.jpg",
  danang: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Dragon_Bridge_in_Da_Nang.jpg/1280px-Dragon_Bridge_in_Da_Nang.jpg"
};

/* 사진이 안 뜰 때 대체 배경 */
const fallbackBackground = {
  seoul: "linear-gradient(135deg,#90caf9,#283593)",
  busan: "linear-gradient(135deg,#81d4fa,#006064)",
  hanoi: "linear-gradient(135deg,#a5d6a7,#2e7d32)",
  hochiminh: "linear-gradient(135deg,#ffcc80,#ef6c00)",
  danang: "linear-gradient(135deg,#80deea,#00838f)"
};

function setDate(){
  const now = new Date();
  document.getElementById("date").innerText =
    now.toLocaleDateString("ko-KR", {
      year:"numeric",
      month:"long",
      day:"numeric",
      weekday:"long"
    });
}
setDate();

function makeRain(){
  const rain = document.getElementById("rain");
  rain.innerHTML = "";
  for(let i=0;i<55;i++){
    const d = document.createElement("div");
    d.className = "drop";
    d.style.left = Math.random()*100 + "%";
    d.style.animationDelay = Math.random() + "s";
    rain.appendChild(d);
  }
}

function makeWind(){
  const wind = document.getElementById("wind");
  wind.innerHTML = "";
  for(let i=0;i<9;i++){
    const w = document.createElement("div");
    w.className = "wind-line";
    w.style.top = (30 + i*22) + "px";
    w.style.animationDelay = Math.random() + "s";
    wind.appendChild(w);
  }
}

function makeDust(){
  const dust = document.getElementById("dust");
  dust.innerHTML = "";
  for(let i=0;i<35;i++){
    const p = document.createElement("div");
    p.className = "dust-particle";
    p.style.left = Math.random()*100 + "%";
    p.style.top = Math.random()*100 + "%";
    p.style.animationDelay = Math.random()*2 + "s";
    dust.appendChild(p);
  }
}

makeRain();
makeWind();
makeDust();

document.getElementById("city").addEventListener("change", () => {
  clearScreen();
  checkAir();
});

function clearScreen(){
  ["result","message","tip","score"].forEach(id=>{
    const el = document.getElementById(id);
    el.classList.remove("show");
    el.innerHTML = "";
  });

  const landmark = document.getElementById("landmark");
  landmark.className = "landmark";
  landmark.style.display = "none";

  document.getElementById("sun").style.display = "none";
  document.getElementById("rain").style.display = "none";
  document.getElementById("wind").style.display = "none";
  document.getElementById("dust").style.display = "none";

  const emoji = document.getElementById("emoji");
  emoji.style.display = "none";
  emoji.innerHTML = "";
}

function ventilationScore(pm25, aqi, rain, wind, humidity){
  let score = 100;

  if(pm25 > 15) score -= 15;
  if(pm25 > 35) score -= 25;
  if(aqi > 50) score -= 15;
  if(aqi > 100) score -= 25;
  if(rain > 0) score -= 25;
  if(wind > 25) score -= 15;
  if(humidity > 80) score -= 10;
  if(humidity < 30) score -= 8;

  if(score < 0) score = 0;
  return score;
}

async function checkAir(){
  clearScreen();

  const selected = document.getElementById("city").value;
  const [lat, lon, cityName, cityKey] = selected.split(",");

  const weatherUrl =
  `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation`;

  const airUrl =
  `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm2_5,pm10,us_aqi`;

  try{
    const weatherResponse = await fetch(weatherUrl);
    const airResponse = await fetch(airUrl);

    const weatherData = await weatherResponse.json();
    const airData = await airResponse.json();

    const temp = weatherData.current.temperature_2m;
    const humidity = weatherData.current.relative_humidity_2m;
    const wind = weatherData.current.wind_speed_10m;
    const rain = weatherData.current.precipitation;

    const pm25 = airData.current.pm2_5;
    const pm10 = airData.current.pm10;
    const aqi = airData.current.us_aqi;

    const score = ventilationScore(pm25, aqi, rain, wind, humidity);

    const landmark = document.getElementById("landmark");
    const emoji = document.getElementById("emoji");

    landmark.style.display = "block";
    landmark.style.backgroundImage =
      `url('${landmarkImages[cityKey]}'), ${fallbackBackground[cityKey]}`;

    let message = "";
    let tip = "";
    let emojiText = "";

    if(pm25 > 35 || aqi > 100){
      landmark.classList.add("dusty");
      document.getElementById("dust").style.display = "block";
      emojiText = "😷";
      message = "미세먼지가 많아요. 마스크 착용을 권장합니다.";
      tip = "오늘은 환기를 오래 하지 말고, 교실 청소와 식물 관리에 집중하는 것이 좋아요.";
    }
    else if(rain > 0){
      landmark.classList.add("rainy");
      document.getElementById("rain").style.display = "block";
      emojiText = "☔";
      message = "비가 오고 있어요. 환기는 짧게 하는 게 좋아요.";
      tip = "습도가 높을 수 있으니 창문을 오래 열기보다는 5~10분 정도만 환기하세요.";
    }
    else if(wind >= 25){
      landmark.classList.add("windy");
      document.getElementById("wind").style.display = "block";
      emojiText = "🌬️";
      message = "바람이 강해요. 창문을 조심해서 열어야 해요.";
      tip = "문이 세게 닫힐 수 있으니 창문을 조금만 열고, 주변 물건을 정리한 뒤 환기하세요.";
    }
    else if(pm25 <= 15 && aqi <= 50 && rain === 0 && wind < 25){
      landmark.classList.add("sunny");
      document.getElementById("sun").style.display = "block";
      emojiText = "🌞";
      message = "오늘은 환기하기 딱 좋은 날씨네요!";
      tip = "창문을 15~20분 정도 열어 교실 공기를 바꿔보세요. 싱고니움에게도 좋은 날이에요.";
    }
    else{
      landmark.classList.add("sunny");
      emojiText = "🙂";
      message = "짧게 환기하기에는 괜찮은 날이에요.";
      tip = "10분 정도 가볍게 환기하면 교실 공기를 개선하는 데 도움이 됩니다.";
    }

    emoji.innerHTML = emojiText;
    emoji.style.display = "block";

    document.getElementById("result").innerHTML = `
      <strong>${cityName} 현재 상태</strong><br>
      온도: ${temp}℃<br>
      습도: ${humidity}%<br>
      바람: ${wind} km/h<br>
      강수량: ${rain} mm<br>
      PM2.5: ${pm25}㎍/㎥<br>
      PM10: ${pm10}㎍/㎥<br>
      AQI: ${aqi}
    `;

    document.getElementById("score").innerHTML =
      `환기 점수: ${score}점 / 100점`;

    document.getElementById("message").innerText = message;
    document.getElementById("tip").innerText = tip;

    setTimeout(()=>{
      document.getElementById("result").classList.add("show");
      document.getElementById("score").classList.add("show");
      document.getElementById("message").classList.add("show");
      document.getElementById("tip").classList.add("show");
    },100);

  }catch(error){
    document.getElementById("message").innerText =
      "날씨 정보를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.";
    document.getElementById("message").classList.add("show");
  }
}
</script>

</body>
</html>
